{% extends 'base.html' %}
{% block content %}

<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow text-center">
  <h1 class="text-xl font-bold mb-4">Delete "{{ object.title }}"?</h1>
  <p class="text-gray-500 mb-6">This action cannot be undone.</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded hover:bg-red-700">Yes, Delete</button>
    <a href="{% url 'jobs:employer_dashboard' %}" class="ml-4 text-gray-500 hover:text-indigo-600">Cancel</a>
  </form>
</div>

{% endblock %}
