{% extends 'base.html' %}
{% block content %}

<h1 class="text-2xl font-bold mb-6">My Applications</h1>

{% for app in applications %}
<div class="bg-white rounded-lg shadow p-5 mb-4">
  <div class="flex justify-between items-center">
    <div>
      <a href="{% url 'jobs:detail' app.job.pk %}" class="font-semibold text-indigo-600 hover:underline">{{ app.job.title }}</a>
      <p class="text-sm text-gray-500">{{ app.job.company }} · Applied {{ app.applied_at|date:"M d, Y" }}</p>
    </div>
    <span class="text-xs px-3 py-1 rounded-full
      {% if app.status == 'pending' %}bg-gray-100 text-gray-600
      {% elif app.status == 'reviewed' %}bg-blue-100 text-blue-600
      {% elif app.status == 'shortlisted' %}bg-green-100 text-green-600
      {% elif app.status == 'rejected' %}bg-red-100 text-red-600{% endif %}">
      {{ app.get_status_display }}
    </span>
  </div>
</div>
{% empty %}
  <p class="text-gray-500 text-center py-12">No applications yet. <a href="{% url 'jobs:listing' %}" class="text-indigo-600">Browse jobs</a>.</p>
{% endfor %}

{% endblock %}
